[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "abbenay-client"
version = "0.0.0-dev"
description = "Abbenay gRPC client for Python"
readme = "README.md"
license = "MIT"
requires-python = ">=3.9"
keywords = ["abbenay", "llm", "grpc", "ai", "client"]
authors = [
    { name = "Abbenay Contributors" }
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "grpcio>=1.60.0",
    "protobuf>=4.25.0",
]

[project.optional-dependencies]
dev = [
    "grpcio-tools>=1.60.0",
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
]

[project.urls]
Homepage = "https://github.com/abbenay/abbenay"
Documentation = "https://github.com/abbenay/abbenay#readme"
Repository = "https://github.com/abbenay/abbenay"

[tool.hatch.build.targets.sdist]
include = [
    "/src",
]

[tool.hatch.build.targets.wheel]
packages = ["src/abbenay_grpc"]

[tool.pytest.ini_options]
asyncio_mode = "auto"

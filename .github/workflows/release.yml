name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux
            arch: x64
          - runner: ubuntu-24.04-arm
            platform: linux
            arch: arm64
          - runner: macos-latest
            platform: darwin
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libsecret-1-dev

      - name: Cache build tools
        uses: actions/cache@v4
        with:
          path: .build-tools
          key: build-tools-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.node-version', 'bootstrap.sh') }}

      - name: Bootstrap
        run: ./bootstrap.sh

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('package-lock.json') }}
          restore-keys: npm-${{ runner.os }}-${{ runner.arch }}-

      - name: Install dependencies
        run: npm ci

      - name: Inject version from tag
        run: node scripts/set-version.js "${GITHUB_REF_NAME#v}"

      - name: Build
        run: npm run ci:build

      - name: Smoke test @abbenay/core
        run: node --input-type=module -e "import { CoreState } from './index.js'" 
        working-directory: packages/daemon/dist/core

      - name: Pack @abbenay/core
        if: matrix.platform == 'linux' && matrix.arch == 'x64'
        run: npm pack
        working-directory: packages/daemon/dist/core

      - name: Upload SEA artifact
        uses: actions/upload-artifact@v7
        with:
          name: abbenay-daemon-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/${{ matrix.platform }}-${{ matrix.arch }}/

      - name: Upload distribution archive
        uses: actions/upload-artifact@v7
        with:
          name: abbenay-archive-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/*.tar.gz

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: abbenay-vsix-${{ matrix.platform }}-${{ matrix.arch }}
          path: packages/vscode/*.vsix

      - name: Upload core tarball
        if: matrix.platform == 'linux' && matrix.arch == 'x64'
        uses: actions/upload-artifact@v7
        with:
          name: abbenay-core
          path: packages/daemon/dist/core/*.tgz

  package-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Cache build tools
        uses: actions/cache@v4
        with:
          path: .build-tools
          key: build-tools-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.node-version', 'bootstrap.sh') }}

      - name: Bootstrap
        run: ./bootstrap.sh

      - name: Inject version from tag
        run: node scripts/set-version.js "${GITHUB_REF_NAME#v}"

      - name: Build Python wheel
        run: npm run ci:package-python

      - name: Upload Python artifact
        uses: actions/upload-artifact@v7
        with:
          name: abbenay-client-python
          path: packages/python/dist/

  publish-python:
    needs: [package-python, release]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
      - name: Download Python artifacts
        uses: actions/download-artifact@v7
        with:
          name: abbenay-client-python
          path: dist/

      - name: Publish to pypi.org
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  release:
    needs: [build, package-python]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-assets/

      - name: Upload release artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          ver="${tag#v}"
          prerelease_flag=""
          if echo "$tag" | grep -qE '(alpha|beta|rc)'; then
            prerelease_flag="--prerelease"
          fi

          assets=(
            release-assets/abbenay-archive-*/*.tar.gz
            release-assets/abbenay-vsix-*/*.vsix
            release-assets/abbenay-core/*.tgz
            release-assets/abbenay-client-python/*.whl
            release-assets/abbenay-client-python/*.tar.gz
          )

          # Strip pre-release suffix for the VSIX version (vsce requires pure semver)
          vsix_ver="${ver%%-*}"

          body="$(cat <<BODY
          ## Artifacts

          | File | What it is | Install |
          |------|-----------|---------|
          | \`abbenay-*-linux-x64.tar.gz\` | Daemon + sidecars (Linux x64) | Extract and run \`./abbenay-daemon\` |
          | \`abbenay-*-linux-arm64.tar.gz\` | Daemon + sidecars (Linux arm64) | Extract and run \`./abbenay-daemon\` |
          | \`abbenay-*-darwin-arm64.tar.gz\` | Daemon + sidecars (macOS Apple Silicon) | Extract and run \`./abbenay-daemon\` |
          | \`abbenay-provider-linux-x64-${vsix_ver}.vsix\` | VS Code extension (Linux x64) | \`code --install-extension <file>\` |
          | \`abbenay-provider-linux-arm64-${vsix_ver}.vsix\` | VS Code extension (Linux arm64) | \`code --install-extension <file>\` |
          | \`abbenay-provider-darwin-arm64-${vsix_ver}.vsix\` | VS Code extension (macOS arm64) | \`code --install-extension <file>\` |
          | \`abbenay-core-${ver}.tgz\` | \`@abbenay/core\` npm package | \`npm install <file>\` |
          | \`abbenay_client-*.whl\` | Python gRPC client | \`pip install <file>\` |
          | \`abbenay_client-*.tar.gz\` | Python client sdist | \`pip install <file>\` |

          ### Which do I need?

          - **VS Code user**: Download the \`.vsix\` for your platform. It includes the daemon.
          - **CLI / standalone daemon**: Download the \`.tar.gz\` archive for your platform.
          - **Node.js library consumer**: Download \`abbenay-core-*.tgz\`.
          - **Python gRPC client**: Download the \`.whl\` file.
          BODY
          )"

          if gh release view "$tag" > /dev/null 2>&1; then
            echo "Release $tag exists — uploading artifacts"
            gh release edit "$tag" --notes "${body}"
            gh release upload "$tag" --clobber "${assets[@]}"
          else
            echo "Creating release $tag"
            gh release create "$tag" \
              --title "$tag" \
              --notes "${body}" \
              $prerelease_flag \
              "${assets[@]}"
          fi

  publish-vscode:
    needs: [build, release]
    runs-on: ubuntu-latest
    environment: release
    if: ${{ !contains(github.ref_name, 'alpha') }}
    steps:
      - uses: actions/checkout@v6

      - name: Cache build tools
        uses: actions/cache@v4
        with:
          path: .build-tools
          key: build-tools-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.node-version', 'bootstrap.sh') }}

      - name: Bootstrap
        run: ./bootstrap.sh

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('package-lock.json') }}
          restore-keys: npm-${{ runner.os }}-${{ runner.arch }}-

      - name: Install dependencies
        run: npm ci

      - name: Download VSIX artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: abbenay-vsix-*
          path: vsix-staging/

      - name: Publish to VS Code Marketplace and OpenVSX
        env:
          VSCODE_MARKETPLACE_TOKEN: ${{ secrets.VSCODE_MARKETPLACE_TOKEN }}
          OVSX_MARKETPLACE_TOKEN: ${{ secrets.OVSX_MARKETPLACE_TOKEN }}
        run: npm run ci:publish-vscode -- vsix-staging

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux
            arch: x64
          - runner: ubuntu-24.04-arm
            platform: linux
            arch: arm64
          - runner: macos-latest
            platform: darwin
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - name: Bootstrap
        run: ./bootstrap.sh

      - name: Install dependencies
        run: npm ci

      - name: Inject version from tag
        run: node scripts/set-version.js "${GITHUB_REF_NAME#v}"

      - name: Build
        run: npm run ci:build

      - name: Smoke test @abbenay/core
        run: node --input-type=module -e "import { CoreState } from './index.js'" 
        working-directory: packages/daemon/dist/core

      - name: Pack @abbenay/core
        if: matrix.platform == 'linux' && matrix.arch == 'x64'
        run: npm pack
        working-directory: packages/daemon/dist/core

      - name: Upload SEA artifact
        uses: actions/upload-artifact@v7
        with:
          name: abbenay-daemon-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/${{ matrix.platform }}-${{ matrix.arch }}/

      - name: Upload distribution archive
        uses: actions/upload-artifact@v7
        with:
          name: abbenay-archive-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/*.tar.gz

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: abbenay-vsix-${{ matrix.platform }}-${{ matrix.arch }}
          path: packages/vscode/*.vsix

      - name: Upload core tarball
        if: matrix.platform == 'linux' && matrix.arch == 'x64'
        uses: actions/upload-artifact@v7
        with:
          name: abbenay-core
          path: packages/daemon/dist/core/*.tgz

  package-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Bootstrap
        run: ./bootstrap.sh

      - name: Inject version from tag
        run: node scripts/set-version.js "${GITHUB_REF_NAME#v}"

      - name: Build Python wheel
        run: npm run ci:package-python

      - name: Upload Python artifact
        uses: actions/upload-artifact@v7
        with:
          name: abbenay-client-python
          path: packages/python/dist/

  release:
    needs: [build, package-python]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-assets/

      - name: Upload release artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          prerelease_flag=""
          if echo "$tag" | grep -qE '(alpha|beta|rc)'; then
            prerelease_flag="--prerelease"
          fi

          assets=(
            release-assets/abbenay-archive-*/*.tar.gz
            release-assets/abbenay-vsix-*/*.vsix
            release-assets/abbenay-core/*.tgz
            release-assets/abbenay-client-python/*.whl
            release-assets/abbenay-client-python/*.tar.gz
          )

          if gh release view "$tag" > /dev/null 2>&1; then
            echo "Release $tag exists — uploading artifacts"
            gh release upload "$tag" --clobber "${assets[@]}"
          else
            echo "Creating release $tag"
            gh release create "$tag" \
              --title "$tag" \
              --generate-notes \
              $prerelease_flag \
              "${assets[@]}"
          fi

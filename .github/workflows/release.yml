name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux
            arch: x64
          - runner: ubuntu-24.04-arm
            platform: linux
            arch: arm64
          - runner: macos-latest
            platform: darwin
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - name: Bootstrap
        run: ./bootstrap.sh

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run ci:build

      - name: Upload SEA artifact
        uses: actions/upload-artifact@v7
        with:
          name: abbenay-daemon-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/${{ matrix.platform }}-${{ matrix.arch }}/

      - name: Upload distribution zip
        uses: actions/upload-artifact@v7
        with:
          name: abbenay-zip-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/abbenay-${{ matrix.platform }}-${{ matrix.arch }}.zip

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: abbenay-vsix-${{ matrix.platform }}-${{ matrix.arch }}
          path: packages/vscode/*.vsix

  package-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Bootstrap
        run: ./bootstrap.sh

      - name: Build Python wheel
        run: npm run ci:package-python

      - name: Upload Python artifact
        uses: actions/upload-artifact@v7
        with:
          name: abbenay-client-python
          path: packages/python/dist/

  release:
    needs: [build, package-python]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-assets/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          prerelease_flag=""
          if echo "$tag" | grep -qE '(alpha|beta|rc)'; then
            prerelease_flag="--prerelease"
          fi

          gh release create "$tag" \
            --title "$tag" \
            --generate-notes \
            $prerelease_flag \
            release-assets/abbenay-zip-*/*.zip \
            release-assets/abbenay-vsix-*/*.vsix \
            release-assets/abbenay-client-python/*.whl \
            release-assets/abbenay-client-python/*.tar.gz
